<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Om symbol stylized as music waves -->
  <g transform="translate(256,256)">
    <!-- Tanpura strings -->
    <line x1="-80" y1="-140" x2="-80" y2="140" stroke="#e07a5f" stroke-width="3" opacity="0.6"/>
    <line x1="-40" y1="-150" x2="-40" y2="150" stroke="#e07a5f" stroke-width="4" opacity="0.7"/>
    <line x1="0" y1="-155" x2="0" y2="155" stroke="#e07a5f" stroke-width="5" opacity="0.8"/>
    <line x1="40" y1="-150" x2="40" y2="150" stroke="#e07a5f" stroke-width="4" opacity="0.7"/>
    <line x1="80" y1="-140" x2="80" y2="140" stroke="#e07a5f" stroke-width="3" opacity="0.6"/>
    <!-- Sound wave arcs -->
    <path d="M-120,-60 Q-90,0 -120,60" fill="none" stroke="#f4a261" stroke-width="4" opacity="0.5"/>
    <path d="M120,-60 Q150,0 120,60" fill="none" stroke="#f4a261" stroke-width="4" opacity="0.5"/>
    <!-- N letter -->
    <text x="0" y="20" text-anchor="middle" font-family="serif" font-size="180" font-weight="bold" fill="#f4a261">N</text>
  </g>
</svg>
